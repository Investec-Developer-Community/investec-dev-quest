name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below.

  - type: input
    id: level
    attributes:
      label: Level ID (if applicable)
      description: e.g. s1-l1
      placeholder: s1-l1
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm game test s1-l1`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `node -v && pnpm -v`
    validations:
      required: true
